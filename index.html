<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Hub Pro</title>
    <style>
        :root {
            --primary: #0095f6;
            --danger: #ed4956;
            --bg: #fafafa;
            --accent: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding: 10px; padding-bottom: 80px; }
        
        .card { background: white; width: 100%; max-width: 450px; border-radius: 15px; border: 1px solid #dbdbdb; box-shadow: 0 4px 20px rgba(0,0,0,0.08); position: relative; overflow: hidden; }

        /* HEADER */
        .header { padding: 30px 20px 20px; text-align: center; border-bottom: 1px solid #eee; position: relative; }
        .admin-btn { position: absolute; top: 10px; right: 10px; background: #333; color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; z-index: 1000; font-size: 11px; font-weight: bold; }
        .video-logo { width: 70px; height: 70px; background: var(--accent); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; }
        .logo-play { width: 0; height: 0; border-top: 12px solid transparent; border-bottom: 12px solid transparent; border-left: 20px solid white; margin-left: 5px; }

        /* SLOT IKLAN */
        .ads-slot { background: #fdfdfd; border: 1px dashed #ccc; margin: 15px; padding: 10px; text-align: center; font-size: 10px; color: #aaa; border-radius: 8px; min-height: 50px; display: flex; align-items: center; justify-content: center; }

        /* VIDEO ITEM */
        .video-feed { padding: 0 15px; display: flex; flex-direction: column; gap: 20px; }
        .video-item { background: white; border-radius: 15px; overflow: hidden; border: 1px solid #eee; position: relative; }
        .video-title { padding: 12px; font-weight: bold; font-size: 15px; color: #262626; }
        
        .video-wrapper { position: relative; width: 100%; height: 250px; background: #000; cursor: pointer; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .play-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 55px; height: 55px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; pointer-events: none; }
        .inner-play { width: 0; height: 0; border-top: 10px solid transparent; border-bottom: 10px solid transparent; border-left: 18px solid white; margin-left: 4px; }

        .admin-controls { padding: 8px; background: #fff5f5; border-top: 1px solid #ffecec; }
        .btn-del { width: 100%; padding: 8px; background: var(--danger); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }

        /* STICKY ADS (MELAYANG) */
        .sticky-ads { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 450px; background: #fff; border-top: 1px solid #ddd; height: 60px; z-index: 9999; display: flex; align-items: center; justify-content: center; }

        #adminPanel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; width: 90%; max-width: 380px; z-index: 10000; padding: 25px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .admin-input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .pagination { display: flex; justify-content: center; gap: 15px; padding: 25px 15px; }
        .btn-nav { background: white; border: 1px solid #ddd; padding: 10px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <button class="admin-btn" id="loginBtn" onclick="authAdmin()">⚙️ ADMIN</button>
        <div class="video-logo"><div class="logo-play"></div></div>
        <h3 style="margin: 0;">Video Hub Pro</h3>
        <div style="font-size: 12px; color: #666; margin-top: 5px;">
            <span style="color:#2ecc71">●</span> <span id="userOnline">142</span> User Online
        </div>
    </div>

    <div class="ads-slot" id="ads-top">
        <script>
  atOptions = {
    'key' : '90fe6b96bcb087940a1b55ba2a059953',
    'format' : 'iframe',
    'height' : 250,
    'width' : 300,
    'params' : {}
  };
</script>
<script src="https://venisonglum.com/90fe6b96bcb087940a1b55ba2a059953/invoke.js"></script>
    </div>

    <div id="videoFeed" class="video-feed"></div>

    <div class="ads-slot" id="ads-middle">
        <script>
  atOptions = {
    'key' : 'b7d561ea23831a6a6d71bb9ab62403d4',
    'format' : 'iframe',
    'height' : 50,
    'width' : 320,
    'params' : {}
  };
</script>
<script src="https://venisonglum.com/b7d561ea23831a6a6d71bb9ab62403d4/invoke.js"></script>
    </div>

    <div class="pagination">
        <button id="prevBtn" class="btn-nav" onclick="navPage(-1)">Back</button>
        <button id="nextBtn" class="btn-nav" onclick="navPage(1)">Next</button>
    </div>
</div>

<div class="sticky-ads">
    <div style="font-size: 9px; color: #ccc;"><script>
  atOptions = {
    'key' : '47d978d14968832cdada419d649a84e4',
    'format' : 'iframe',
    'height' : 60,
    'width' : 468,
    'params' : {}
  };
</script>
<script src="https://venisonglum.com/47d978d14968832cdada419d649a84e4/invoke.js"></script></div>
</div>

<div id="adminPanel">
    <h3 style="margin-top: 0;">Tambah Video</h3>
    <input type="text" id="inpTitle" class="admin-input" placeholder="Judul Video">
    <input type="text" id="inpUrl" class="admin-input" placeholder="Link .mp4">
    <button onclick="submitVideo()" style="width:100%; padding:12px; background:#2ecc71; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">PUBLIKASIKAN</button>
    <button onclick="toggleAdminPanel(false)" style="width:100%; padding:8px; background:none; border:none; color:#666; cursor:pointer; margin-top:5px;">Tutup</button>
</div>

<script>
    const KEY = "dik123";
    let page = 0;
    const size = 3;
    let isLogged = false;

    let videos = JSON.parse(localStorage.getItem('db_videos')) || [
        { title: "Sample Video 1", url: "https://www.w3schools.com/html/mov_bbb.mp4" },
        { title: "Sample Video 2", url: "https://www.w3schools.com/html/movie.mp4" }
    ];

    function render() {
        const container = document.getElementById('videoFeed');
        container.innerHTML = '';
        const start = page * size;
        const visible = videos.slice(start, start + size);

        visible.forEach((v, i) => {
            const idx = start + i;
            const item = document.createElement('div');
            item.className = 'video-item';
            
            let content = `
                <div class="video-title">${v.title}</div>
                <div class="video-wrapper" onclick="togglePlay(this)">
                    <video loop muted playsinline autoplay>
                        <source src="${v.url}" type="video/mp4">
                    </video>
                    <div class="play-overlay"><div class="inner-play"></div></div>
                </div>
            `;

            if (isLogged) {
                content += `<div class="admin-controls"><button class="btn-del" onclick="delVideo(${idx})">Hapus Postingan</button></div>`;
            }

            item.innerHTML = content;
            container.appendChild(item);
        });

        document.getElementById('prevBtn').disabled = (page === 0);
        document.getElementById('nextBtn').disabled = (start + size >= videos.length);
        localStorage.setItem('db_videos', JSON.stringify(videos));
    }

    function togglePlay(wrapper) {
        const vid = wrapper.querySelector('video');
        const overlay = wrapper.querySelector('.play-overlay');
        if (vid.paused) {
            vid.play();
            vid.muted = false;
            overlay.style.display = 'none';
        } else {
            vid.pause();
            overlay.style.display = 'flex';
        }
    }

    function authAdmin() {
        if (!isLogged) {
            if (prompt("Password:") === KEY) {
                isLogged = true;
                document.getElementById('loginBtn').textContent = "➕ TAMBAH";
                document.getElementById('loginBtn').style.background = "#2ecc71";
                render();
            }
        } else {
            toggleAdminPanel(true);
        }
    }

    function toggleAdminPanel(show) { document.getElementById('adminPanel').style.display = show ? 'block' : 'none'; }

    function submitVideo() {
        const t = document.getElementById('inpTitle').value;
        const u = document.getElementById('inpUrl').value;
        if (t && u) {
            videos.unshift({ title: t, url: u });
            localStorage.setItem('db_videos', JSON.stringify(videos));
            location.reload();
        }
    }

    function delVideo(i) { if (confirm("Hapus?")) { videos.splice(i, 1); render(); } }
    function navPage(s) { page += s; render(); window.scrollTo(0, 0); }

    // User Online Simulasi
    setInterval(() => {
        document.getElementById('userOnline').textContent = Math.floor(Math.random() * 40) + 120;
    }, 4000);

    window.onload = render;
</script>
